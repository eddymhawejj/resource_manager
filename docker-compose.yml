services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=resource_manager
      - POSTGRES_USER=resmanager
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resmanager -d resource_manager"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/drive:/app/data/drive
      - ./app/static/uploads:/app/app/static/uploads
      - /etc/resolv.conf:/etc/resolv.conf:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-string}
      - DATABASE_URL=postgresql://resmanager:${POSTGRES_PASSWORD:-changeme}@localhost:5432/resource_manager
      - GUACD_HOST=localhost
      - GUACD_PORT=4822
      - GUACLITE_URL=${GUACLITE_URL:-ws://localhost:8080}
      - GUACLITE_SECRET_KEY=${GUACLITE_SECRET_KEY:-4BQXC6JAPXst3EDAHhjpJRa2bNGi3lON}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-}
      - DRIVE_PATH=/app/data/drive
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-}
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL:-}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-}
      - LDAP_USER_DN=${LDAP_USER_DN:-}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - PING_INTERVAL_SECONDS=${PING_INTERVAL_SECONDS:-60}
      - PING_TIMEOUT_SECONDS=${PING_TIMEOUT_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_started
      guacamole-lite:
        condition: service_started

  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    network_mode: host
    user: root
    entrypoint: ["/bin/sh", "-c", "umask 0000 && exec /opt/guacamole/sbin/guacd -b 0.0.0.0 -L info -f"]
    volumes:
      - ./data/drive:/drive
      - guacd_record:/record
      - /etc/resolv.conf:/etc/resolv.conf:ro
    environment:
      - GUACD_LOG_LEVEL=info

  guacamole-lite:
    image: node:18-alpine
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    command: ["sh", "-c", "npm install --production && node server.js"]
    volumes:
      - ./guacamole-lite:/app
      - guaclite_modules:/app/node_modules
    environment:
      - GUACLITE_PORT=8080
      - GUACD_HOST=localhost
      - GUACD_PORT=4822
      - GUACLITE_SECRET_KEY=${GUACLITE_SECRET_KEY:-4BQXC6JAPXst3EDAHhjpJRa2bNGi3lON}

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  guacd_record:
  guaclite_modules:
