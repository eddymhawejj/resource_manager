services:
  guacd:
    image: guacamole/guacd:1.5.5
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c", "umask 0000 && exec /opt/guacamole/sbin/guacd -b 0.0.0.0 -L info -f"]
    ports:
      - "4822:4822"
    volumes:
      - ./data/drive:/drive
      - guacd_record:/record
    environment:
      - GUACD_LOG_LEVEL=info

  guacamole-lite:
    image: node:18-alpine
    restart: unless-stopped
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "${GUACLITE_PORT:-8080}:8080"
    volumes:
      - ./guacamole-lite:/app
    environment:
      - GUACLITE_PORT=8080
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - GUACLITE_SECRET_KEY=${GUACLITE_SECRET_KEY:-4BQXC6JAPXst3EDAHhjpJRa2bNGi3lON}
    depends_on:
      - guacd

volumes:
  guacd_record:
